name: Contract Tests

on:
  push:
    branches: [ main ]
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/contract-test.mjs'
      - 'package.json'
      - 'package-lock.json'

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run contract validation
        run: npm run contract:test
