name: Seam Documentation Check

on:
  pull_request:
    paths:
      - 'contracts/**'
      - 'src/tools/**'

jobs:
  check-contract-documentation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate contract documentation
        run: node scripts/generate-contract-docs.mjs > /tmp/contract-report.md

      - name: Comment on PR with contract changes
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/contract-report.md', 'utf8');
            
            if (report.includes('No changes')) {
              console.log('No contract changes to report');
              return;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Seam Contract Changes\n\n${report}\n\n*This report is automatically generated to help review seam-driven contract changes.*`
            });
