<app-suno-format [loading]="loading" (format)="formatLyrics($event)"></app-suno-format>

<div class="status" *ngIf="error">
  <p class="error">{{ error }}</p>
</div>

<div class="result" *ngIf="formatted as output">
  <h3>Suno Ready Lyrics</h3>
  <pre>{{ output.formatted_lyrics }}</pre>
  <h4>Structure Markers</h4>
  <ul>
    <li *ngFor="let marker of output.structure_markers">{{ marker }}</li>
  </ul>
  <h4>Formatting Notes</h4>
  <p>{{ output.formatting_notes }}</p>
  <h4>Suno Best Practices</h4>
  <ul>
    <li *ngFor="let tip of output.suno_best_practices">{{ tip }}</li>
  </ul>
</div>
